<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Painel de Preços - O Mercadinho</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">

</head>

<body>

    <!-- =====================================
    TOPO
    ====================================== -->

    <header class="topo">

        <div class="empresa">

            <img
                src="imagens/logo_omercadinho.png"
                class="logo"
                alt="Logo">

            <div>

                <h1>O MERCADINHO</h1>

                <span>Açougue • Padaria</span>

            </div>

        </div>

        <div class="informacoes">

            <div id="data"></div>

            <div id="hora"></div>

            <div class="total">

                Produtos:
                <span id="totalProdutos">0</span>

            </div>

        </div>

    </header>


    <!-- =====================================
    OFERTA
    ====================================== -->

    <section class="barraOferta">

        <div id="textoOferta">

            🔥 OFERTAS DO DIA

        </div>

    </section>


    <!-- =====================================
    CABEÇALHO DA TABELA
    ====================================== -->

    <section class="cabecalhoTabela">

        <div class="colProduto">

            PRODUTO

        </div>

        <div class="colTipo">

            TIPO

        </div>

        <div class="colPreco">

            PREÇO

        </div>

    </section>


    <!-- =====================================
    LISTA
    ====================================== -->

    <main
        id="produtos"
        class="listaProdutos">

    </main>


    <!-- =====================================
    RODAPÉ
    ====================================== -->

    <footer class="rodape">

        <button
            id="anterior"
            class="botao">

            ◀

        </button>

        <div
            id="paginaAtual">

            Página 1

        </div>

        <button
            id="proximo"
            class="botao">

            ▶

        </button>

    </footer>

    <script src="app.js"></script>

</body>

</html>
