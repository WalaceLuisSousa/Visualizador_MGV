<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Visualizador MGV</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">

</head>

<body>

    <!-- TOPO -->

    <header class="topo">

        <div class="logo">

            <img
                src="imagens/logo_omercadinho.png"
                class="logoImagem"
                alt="Logo">

            <div class="logoTexto">

                <h1>O MERCADINHO</h1>

                <span>Painel de Consulta de Preços</span>

            </div>

        </div>

        <div class="relogio">

            <div id="data"></div>

            <div id="hora"></div>

        </div>

    </header>

    <!-- OFERTAS -->

    <section class="barraOferta">

        <marquee id="textoOferta" behavior="scroll" direction="left">

            Carregando ofertas...

        </marquee>

    </section>

    <!-- CABEÇALHO -->

    <section class="cabecalho">

        <div class="colProduto">

            PRODUTO

        </div>

        <div class="colTipo">

            TIPO

        </div>

        <div class="colPreco">

            PREÇO

        </div>

    </section>

    <!-- PRODUTOS -->

    <main>

        <div
            id="produtos"
            class="listaProdutos">

        </div>

    </main>

    <!-- RODAPÉ -->

    <footer>

        <button
            id="anterior"
            class="botao">

            ◀

        </button>

        <div id="paginaAtual">

            Página 1

        </div>

        <div id="ultimaAtualizacao">

            --

        </div>

        <button
            id="proximo"
            class="botao">

            ▶

        </button>

        <div class="total">

            Produtos:
            <span id="totalProdutos">

                0

            </span>

        </div>

    </footer>

    <script src="app.js"></script>

</body>

</html>
